n>;isScrolling=<span class="literal">false</span>&#125;<span class="keyword">else</span>&#123;b=setInterval(<span class="function"><span class="title">function</span></span>()&#123;window.scrollBy(0,num/10)&#125;,100);isScrolling=<span class="literal">true</span>;btn.innerHTML=<span class="string">"stop_scroll"</span>&#125;&#125;,200)&#125;;btn.ondblclick=<span class="function"><span class="title">function</span></span>()&#123;<span class="keyword">if</span>(clickTimer)&#123;window.clearTimeout(clickTimer);clickTimer=null&#125;clearInterval(b);num=undefined;<span class="keyword">while</span>(isNaN(num))num=prompt(<span class="string">"\u91cd\u8bbe\u6eda\u52a8\u901f\u5ea6"</span>,<span class="string">"10"</span>);b=setInterval(<span class="function"><span class="title">function</span></span>()&#123;window.scrollBy(0,num/10);isScrolling=<span class="literal">true</span>;btn.innerHTML=<span class="string">"stop_scroll"</span>&#125;,100)&#125;&#125;)();</span><br></pre></table></figure><p><p>将上面代码存为书签，即可实现自动滚屏功能。可上滚（负值），下滚。</div><footer class="post-footer"><div class="post-tags"><a href="/tags/js/" rel="tag"># js</a></div><div class="post-nav"><div class="post-nav-next post-nav-item"><a href="/2016/09/01/git-学习笔记-三/" rel="next" title="git 学习笔记(三)"><i class="fa fa-chevron-left"></i> git 学习笔记(三)</a></div><span class="post-nav-divider"></span><div class="post-nav-prev post-nav-item"><a href="/2016/09/13/慕课学习/" rel="prev" title="慕课学习">慕课学习 <i class="fa fa-chevron-right"></i></a></div></div></footer></div></article><div class="post-spread"></div></div></div><div class="comments" id="comments"><div id="lv-container" data-id="city" data-uid="MTAyMC81MjY5OS8yOTE3Ng=="></div></div></div><div class="sidebar-toggle"><div class="sidebar-toggle-line-wrap"><span class="sidebar-toggle-line sidebar-toggle-line-first"></span> <span class="sidebar-toggle-line sidebar-toggle-line-middle"></span> <span class="sidebar-toggle-line sidebar-toggle-line-last"></span></div></div><aside id="sideb
